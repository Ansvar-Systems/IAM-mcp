version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Stockholm
    open-pull-requests-limit: 10
    target-branch: dev
    groups:
      hono:
        patterns:
          - "hono"
          - "@hono/*"
      vercel:
        patterns:
          - "@vercel/*"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
