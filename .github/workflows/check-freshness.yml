name: Check Data Freshness

on:
  schedule:
    # Run every Monday at 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  check-freshness:
    name: Detect upstream drift
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run drift detection
        id: drift
        run: |
          npx tsx scripts/drift-detect.ts 2>&1 | tee drift-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Open issue on drift detected
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const output = require('fs').readFileSync('drift-output.txt', 'utf8');
            const title = `[Data Freshness] Upstream drift detected — ${new Date().toISOString().split('T')[0]}`;
            const body = [
              '## Upstream drift detected',
              '',
              'The scheduled freshness check found changes in upstream IAM data sources.',
              'A database rebuild may be required.',
              '',
              '```',
              output.slice(0, 4000),
              '```',
              '',
              'Trigger the [ingest workflow](../../actions/workflows/ingest.yml) to rebuild the database.',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['data-freshness', 'automated'],
            });
