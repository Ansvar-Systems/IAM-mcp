name: Drift Detection

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 6 AM UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  drift-detect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Check NIST SP 800-53 freshness
        id: nist_53
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' \
            -I 'https://csrc.nist.gov/extensions/nudp/services/json/nudp/framework/version/sp_800_53_5_1_1')
          ETAG=$(curl -s -I 'https://csrc.nist.gov/extensions/nudp/services/json/nudp/framework/version/sp_800_53_5_1_1' \
            | grep -i etag | tr -d '\r' || echo "no-etag")
          echo "nist53_etag=$ETAG" >> "$GITHUB_OUTPUT"
          echo "NIST SP 800-53 status: $HTTP_CODE, ETag: $ETAG"
        continue-on-error: true

      - name: Check NIST SP 800-63 freshness
        id: nist_63
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' \
            'https://pages.nist.gov/800-63-4/')
          echo "NIST SP 800-63 page status: $HTTP_CODE"
        continue-on-error: true

      - name: Check MITRE ATT&CK version
        id: mitre
        run: |
          ATTACK_VERSION=$(curl -s 'https://raw.githubusercontent.com/mitre/cti/master/enterprise-attack/enterprise-attack.json' \
            | head -c 2000 | grep -o '"x_mitre_version":"[^"]*"' | head -1 || echo "unknown")
          echo "attack_version=$ATTACK_VERSION" >> "$GITHUB_OUTPUT"
          echo "ATT&CK version: $ATTACK_VERSION"
        continue-on-error: true

      - name: Check CWE version
        id: cwe
        run: |
          CWE_VERSION=$(curl -s -I 'https://cwe.mitre.org/data/xml/cwec_latest.xml.zip' \
            | grep -i 'last-modified' | tr -d '\r' || echo "unknown")
          echo "cwe_modified=$CWE_VERSION" >> "$GITHUB_OUTPUT"
          echo "CWE last modified: $CWE_VERSION"
        continue-on-error: true

      - name: Check CAPEC version
        id: capec
        run: |
          CAPEC_VERSION=$(curl -s -I 'https://capec.mitre.org/data/xml/capec_latest.xml' \
            | grep -i 'last-modified' | tr -d '\r' || echo "unknown")
          echo "capec_modified=$CAPEC_VERSION" >> "$GITHUB_OUTPUT"
          echo "CAPEC last modified: $CAPEC_VERSION"
        continue-on-error: true

      - name: Check CIS Controls version
        id: cis
        run: |
          CIS_VERSION=$(curl -s 'https://www.cisecurity.org/controls' \
            | grep -o 'Version [0-9.]*' | head -1 || echo "unknown")
          echo "cis_version=$CIS_VERSION" >> "$GITHUB_OUTPUT"
          echo "CIS Controls: $CIS_VERSION"
        continue-on-error: true

      - name: Check OWASP ASVS version
        id: owasp
        run: |
          ASVS_TAG=$(curl -s 'https://api.github.com/repos/OWASP/ASVS/releases/latest' \
            | grep '"tag_name"' | cut -d'"' -f4 || echo "unknown")
          echo "asvs_tag=$ASVS_TAG" >> "$GITHUB_OUTPUT"
          echo "OWASP ASVS latest release: $ASVS_TAG"
        continue-on-error: true

      - name: Run drift detection script
        run: npm run drift:detect
        continue-on-error: true

      - name: Create issue if drift detected
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `[Drift Detection] Upstream data sources may have changed — ${new Date().toISOString().split('T')[0]}`;
            const body = [
              '## Upstream Source Freshness Check',
              '',
              'The weekly drift detection workflow has detected potential changes in upstream data sources.',
              '',
              '### Sources Checked',
              '- NIST SP 800-53',
              '- NIST SP 800-63',
              '- MITRE ATT&CK',
              '- CWE (Common Weakness Enumeration)',
              '- CAPEC (Common Attack Pattern Enumeration)',
              '- CIS Controls',
              '- OWASP ASVS',
              '',
              '### Action Required',
              'Review the [workflow run](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ') for details and re-ingest any updated sources.',
              '',
              '```bash',
              'npm run ingest  # Re-ingest all sources',
              '```',
            ].join('\n');

            // Check for existing open drift issues to avoid duplicates
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'drift-detection',
            });

            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['drift-detection'],
              });
            }
